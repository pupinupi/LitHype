<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LitHype: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Лобби -->
<div id="lobby">
  <h1>Лобби</h1>
  <input type="text" id="name" placeholder="Имя">
  <input type="text" id="room" placeholder="Код комнаты">
  <div id="emojiSelect">
    <span onclick="selectEmoji(this)">🚗</span>
    <span onclick="selectEmoji(this)">🔥</span>
    <span onclick="selectEmoji(this)">💎</span>
    <span onclick="selectEmoji(this)">🚀</span>
  </div>
  <button onclick="joinRoom()">Войти в комнату</button>
</div>

<!-- Игра -->
<div id="game" style="display:none;">
  <h2 id="turn"></h2>
  <div id="boardContainer">
    <img src="board.jpg" alt="Поле" id="board">
    <div id="players"></div>
  </div>
  <div id="hypeBar">
    <div id="hypeFill"></div>
    <span id="hypeText">Хайп: 0 / 70</span>
  </div>
  <button onclick="rollDice()">Бросить кубик</button>
</div>

<!-- Модалка событий -->
<div id="eventModal" class="modal" style="display:none;"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase конфиг
const firebaseConfig = {
  apiKey: "AIzaSyB1ylKDzgEFLxyef5dyD_TD6QKlc6EDm_Y",
  authDomain: "lithype-12c30.firebaseapp.com",
  projectId: "lithype-12c30",
  storageBucket: "lithype-12c30.firebasestorage.app",
  messagingSenderId: "734689233128",
  appId: "1:734689233128:web:302484bff4b55b355fa15d"
};

// Инициализация Firebase
const app = initializeApp(firebaseConfig);
window.db = getFirestore(app); // глобальная переменная для script.js

// Выбор фишки
window.selectEmoji = function(el){
  document.querySelectorAll("#emojiSelect span").forEach(e=>e.classList.remove("selected"));
  el.classList.add("selected");
}

// Вход в комнату
window.joinRoom = async function(){
  const name = document.getElementById("name").value.trim();
  const roomCode = document.getElementById("room").value.trim();
  const emojiEl = document.querySelector("#emojiSelect .selected");
  if(!name || !roomCode || !emojiEl) return alert("Заполни все поля и выбери фишку!");
  const emoji = emojiEl.innerText;

  const roomRef = doc(db, "rooms", roomCode);
  try{
    const docSnap = await getDoc(roomRef);
    if(!docSnap.exists()) await setDoc(roomRef, {players:{}, turnIndex:0});
    await updateDoc(roomRef, {[`players.${Date.now()}`]: {name, emoji, pos:0, hype:0, skip:false}});
    document.getElementById("lobby").style.display = "none";
    document.getElementById("game").style.display = "block";
  }catch(e){
    alert("Ошибка: " + e.message);
  }
}
</script>

<!-- Подключаем JS с логикой игры -->
<script src="script.js"></script>

</body>
</html>
